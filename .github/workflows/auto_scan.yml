name: Naver Trend Scanner

on:
  schedule:
    # 6회/일 (4시간 간격) - KST 기준
    - cron: '0 21 * * *'  # 06:00 KST
    - cron: '0 1 * * *'   # 10:00 KST
    - cron: '0 5 * * *'   # 14:00 KST
    - cron: '0 9 * * *'   # 18:00 KST
    - cron: '0 13 * * *'  # 22:00 KST
    - cron: '0 17 * * *'  # 02:00 KST
  workflow_dispatch:  # 수동 실행 가능

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scanner
        run: python scanner.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "🤖 Auto scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
