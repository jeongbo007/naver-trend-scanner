name: Naver Trend Scanner

on:
  schedule:
    # 하루 5회 (KST = UTC+9)
    - cron: '0 20 * * *'   # KST 05:00
    - cron: '0 0 * * *'    # KST 09:00
    - cron: '0 5 * * *'    # KST 14:00
    - cron: '0 9 * * *'    # KST 18:00
    - cron: '0 14 * * *'   # KST 23:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scanner.py

      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "🔍 스캔 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
